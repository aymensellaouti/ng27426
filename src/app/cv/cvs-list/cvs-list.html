
<ol class="list-group" data-cy="cvsList">
  @for (cv of cvs() ; track cv.id) {
    <li
      [class]="{
        'list-group-item-primary': $even,
        'list-group-item-secondary': $odd
      }"
      class="list-group-item">
      <app-cv-item

      [cv]="cv" />
    </li>
  } @empty {
    <li class="list-grop-item-danger">
      Il n'y a pas encore de cvs
    </li>
  }
</ol>
