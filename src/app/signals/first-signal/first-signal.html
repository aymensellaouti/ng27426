<p>Counter : {{ counter() }}</p>
<p (click)="addAymen()">Je posséde {{namesLegth()}} noms</p>
<button (click)="incremet()" class="btn btn-success">
  increment
</button>

<button (click)="reset()" class="btn btn-danger">
  reset
</button>

<ol class="list-group">
  @for (name of names(); track $index) {
    <li>
      {{name}}
    </li>
  }
</ol>
